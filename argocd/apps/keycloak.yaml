apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: keycloak
    targetRevision: 25.2.0
    helm:
      valuesObject:
        auth:
          adminUser: leo
          adminPassword: admin

        production: false

        image:
          registry: docker.io
          repository: bitnamilegacy/keycloak
          tag: 26.3.3-debian-12-r0

        ingress:
          enabled: true
          ingressClassName: nginx
          hostname: auth.local
          path: /
          pathType: Prefix

        extraEnvVars:
          - name: KC_HOSTNAME
            value: "https://auth.local"
          - name: KC_PROXY_HEADERS
            value: "xforwarded"
          - name: KC_HTTP_ENABLED
            value: "true"
          - name: KC_HOSTNAME_STRICT
            value: "false"

        postgresql:
          enabled: true
          image:
            registry: docker.io
            repository: bitnamilegacy/postgresql
            tag: 17.6.0-debian-12-r4
          auth:
            username: bn_keycloak
            password: bn_keycloak_password
            database: bitnami_keycloak
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
