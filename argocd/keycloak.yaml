apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: keycloak
    targetRevision: 22.1.3
    helm:
      values: |
        auth:
          adminUser: leo
          adminPassword: admin

        ingress:
          enabled: true
          ingressClassName: nginx
          hostname: auth.local

        postgresql:
          enabled: false

        externalDatabase:
          host: ""
        
        extraEnvVars:
          - name: KC_DB
            value: dev-mem
          

  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
