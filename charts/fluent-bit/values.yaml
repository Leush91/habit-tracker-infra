fluent-bit:
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 1
          Log_Level info
          Parsers_File /fluent-bit/etc/parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020

    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*_app_*.log
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 50MB
          Skip_Long_Lines On
          Refresh_Interval 5
          Inotify_Watcher false

    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude Off

      [FILTER]
          Name modify
          Match kube.*
          Add cluster_name kind-local
          Add source kubernetes

    outputs: |
      [OUTPUT]
          Name splunk
          Match kube.*
          Host 172.18.0.1
          Port 8088
          TLS Off
          TLS.Verify Off
          Splunk_Token REPLACE_WITH_YOUR_REAL_HEC_TOKEN
          Splunk_Send_Raw On
          compress gzip

  daemonSetVolumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers

  daemonSetVolumeMounts:
    - name: varlog
      mountPath: /var/log
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true