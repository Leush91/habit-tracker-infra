apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: habit-tracker
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - habit.local
      secretName: habit-tls
  rules:
    - host: habit.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: habit-tracker
                port:
                  number: 80
